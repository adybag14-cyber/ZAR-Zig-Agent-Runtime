name: zig-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) primary
        id: setup_zig_primary
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback
        id: setup_zig_mirror_mach
        if: steps.setup_zig_primary.outcome == 'failure'
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://pkg.machengine.org/zig
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback (ziglang.org)
        if: steps.setup_zig_primary.outcome == 'failure' && steps.setup_zig_mirror_mach.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://ziglang.org/builds
          use-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Zig version
        run: zig version

      - name: Zig master freshness snapshot (Codeberg with mirror fallback)
        shell: pwsh
        continue-on-error: true
        run: ./scripts/zig-codeberg-master-check.ps1 -OutputJsonPath zig-master-freshness.json

      - name: Zig GitHub mirror release snapshot
        shell: pwsh
        continue-on-error: true
        run: ./scripts/zig-github-mirror-release-check.ps1 -GitHubToken "${{ github.token }}" -OutputJsonPath zig-github-mirror-release.json -OutputMarkdownPath zig-github-mirror-release.md

      - name: Validate npm package (dry-run)
        working-directory: npm/openclaw-zig-rpc-client
        run: npm pack --dry-run

      - name: Validate python package (tests + build)
        shell: pwsh
        run: ./scripts/python-pack-check.ps1

      - name: Regenerate RPC reference
        shell: pwsh
        run: ./scripts/generate-rpc-reference.ps1

      - name: Verify RPC reference is up to date
        run: git diff --exit-code -- docs/rpc-reference.md

      - name: Build (Debug)
        run: zig build --summary all

      - name: Test
        run: zig build test --summary all

      - name: Benchmark smoke lane
        shell: pwsh
        run: ./scripts/benchmark-smoke-check.ps1 -SkipBuild

      - name: Benchmark smoke lane (RTL8139 NIC loopback)
        shell: pwsh
        run: ./scripts/benchmark-smoke-check.ps1 -SkipBuild -Filter network.rtl8139_udp_loopback

      - name: Benchmark smoke lane (E1000 NIC loopback)
        shell: pwsh
        run: ./scripts/benchmark-smoke-check.ps1 -SkipBuild -Filter network.e1000_udp_loopback

      - name: Method parity gate (Go latest release + original latest release + original latest beta)
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -GitHubToken "${{ github.token }}" -GoTag v2.14.0-go -OriginalRef v2026.3.13-1 -OriginalBetaRef v2026.3.13-beta.1 -OutputJsonPath parity-go-zig.json -OutputMarkdownPath parity-go-zig.md

      - name: Docs status drift gate
        shell: pwsh
        run: ./scripts/docs-status-check.ps1 -ParityJsonPath parity-go-zig.json -GitHubToken "${{ github.token }}"

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-methods
          path: |
            parity-go-zig.json
            parity-go-zig.md

      - name: Upload Zig freshness snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-master-freshness
          path: zig-master-freshness.json
          if-no-files-found: ignore

      - name: Upload Zig GitHub mirror release snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-github-mirror-release
          path: |
            zig-github-mirror-release.json
            zig-github-mirror-release.md
          if-no-files-found: ignore

      - name: Build release (x86_64-linux)
        run: zig build -Dtarget=x86_64-linux -Doptimize=ReleaseFast --summary all

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) for bare-metal lane
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          use-cache: true

      - name: Export pinned Zig for bare-metal lane
        shell: bash
        run: |
          set -euo pipefail
          ZIG_BIN="$(command -v zig)"
          echo "OPENCLAW_ZIG_BIN=${ZIG_BIN}" >> "$GITHUB_ENV"
          echo "BAREMETAL_ZIG_BIN=${ZIG_BIN}" >> "$GITHUB_ENV"

      - name: Bare-metal Zig version
        shell: pwsh
        run: |
          Write-Output "BAREMETAL_ZIG_BIN=$env:BAREMETAL_ZIG_BIN"
          & $env:OPENCLAW_ZIG_BIN version

      - name: Bare-metal smoke check (freestanding build)
        shell: pwsh
        run: ./scripts/baremetal-smoke-check.ps1

      - name: Bare-metal i386 smoke check (freestanding build)
        shell: pwsh
        run: ./scripts/baremetal-i386-smoke-check.ps1

      - name: Bare-metal QEMU families run in parallel jobs
        shell: bash
        run: echo "Bare-metal QEMU coverage moved to the baremetal-qemu-groups matrix job."
      - name: Runtime smoke check (serve + rpc)
        shell: pwsh
        run: ./scripts/runtime-smoke-check.ps1 -SkipBuild

      - name: Hermes hosted coding-agent smoke check (serve + rpc)
        shell: pwsh
        run: ./scripts/hermes-port-runtime-smoke-check.ps1 -SkipBuild

      - name: Gateway auth smoke check (token gate for rpc + websocket)
        shell: pwsh
        run: ./scripts/gateway-auth-smoke-check.ps1 -SkipBuild

      - name: Security secret-store smoke check (strict FS4 secret/auth lane)
        shell: pwsh
        run: ./scripts/security-secret-store-smoke-check.ps1 -SkipBuild

      - name: WebSocket smoke check (/ws rpc frames)
        shell: pwsh
        run: ./scripts/websocket-smoke-check.ps1 -SkipBuild

      - name: Web login smoke check (strict FS2 browser-session auth lane)
        shell: pwsh
        run: ./scripts/web-login-smoke-check.ps1 -SkipBuild

      - name: Browser completion success smoke check (strict FS2 bridge completion lane)
        shell: pwsh
        run: ./scripts/browser-request-success-smoke-check.ps1 -SkipBuild

      - name: Browser memory-context smoke check (strict FS3 consumer lane)
        shell: pwsh
        run: ./scripts/browser-request-memory-context-smoke-check.ps1 -SkipBuild

      - name: Direct-provider browser completion success smoke check (strict FS2 direct-provider lane)
        shell: pwsh
        run: ./scripts/browser-request-direct-provider-success-smoke-check.ps1 -SkipBuild

      - name: OpenRouter direct-provider completion success smoke check (strict FS2 direct-provider lane)
        shell: pwsh
        run: ./scripts/browser-request-openrouter-direct-provider-success-smoke-check.ps1 -SkipBuild

      - name: OpenCode direct-provider completion success smoke check (strict FS2 direct-provider lane)
        shell: pwsh
        run: ./scripts/browser-request-opencode-direct-provider-success-smoke-check.ps1 -SkipBuild

      - name: Telegram reply-loop smoke check (strict FS2 command/reply lane)
        shell: pwsh
        run: ./scripts/telegram-reply-loop-smoke-check.ps1 -SkipBuild

      - name: Telegram reply memory-context smoke check (strict FS3 consumer lane)
        shell: pwsh
        run: ./scripts/telegram-reply-memory-context-smoke-check.ps1 -SkipBuild

      - name: Telegram webhook receive success smoke check (strict FS2 ingress lane)
        shell: pwsh
        run: ./scripts/telegram-webhook-receive-smoke-check.ps1 -SkipBuild

      - name: Telegram bot-send delivery success smoke check (strict FS2 delivery lane)
        shell: pwsh
        run: ./scripts/telegram-bot-send-delivery-smoke-check.ps1 -SkipBuild

      - name: Edge WASM lifecycle smoke check (strict FS5 wasm lane)
        shell: pwsh
        run: ./scripts/edge-wasm-lifecycle-smoke-check.ps1 -SkipBuild

      - name: Edge finetune lifecycle smoke check (strict FS5 finetune lane)
        shell: pwsh
        run: ./scripts/edge-finetune-lifecycle-smoke-check.ps1 -SkipBuild

      - name: Update lifecycle smoke check (plan/run/status)
        shell: pwsh
        run: ./scripts/update-lifecycle-smoke-check.ps1 -SkipBuild

      - name: System maintenance smoke check (plan/run/status)
        shell: pwsh
        run: ./scripts/system-maintenance-smoke-check.ps1 -SkipBuild

      - name: Appliance control-plane smoke check (boot/rollback/update gate)
        shell: pwsh
        run: ./scripts/appliance-control-plane-smoke-check.ps1 -SkipBuild

      - name: Appliance restart recovery smoke check (persisted control-plane replay)
        shell: pwsh
        run: ./scripts/appliance-restart-recovery-smoke-check.ps1 -SkipBuild

      - name: Appliance rollout boundary smoke check (canary to stable promotion)
        shell: pwsh
        run: ./scripts/appliance-rollout-boundary-smoke-check.ps1 -SkipBuild

      - name: Appliance minimal profile smoke check (readiness contract)
        shell: pwsh
        run: ./scripts/appliance-minimal-profile-smoke-check.ps1 -SkipBuild

      - name: FS6 appliance-baremetal closure gate
        shell: pwsh
        run: ./scripts/appliance-baremetal-closure-smoke-check.ps1 -SkipBuild

  qemu-group-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.groups.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load bare-metal QEMU group matrix
        id: groups
        shell: pwsh
        run: |
          $groups = Get-Content .github/qemu-groups/index.json -Raw | ConvertFrom-Json
          $matrix = @{
            include = @(
              $groups | ForEach-Object {
                @{
                  id = $_.id
                  step_count = $_.stepCount
                }
              }
            )
          } | ConvertTo-Json -Compress -Depth 6
          "matrix=$matrix" >> $env:GITHUB_OUTPUT

  baremetal-qemu-groups:
    name: baremetal-qemu (${{ matrix.id }})
    needs: qemu-group-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache
      ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.qemu-group-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) primary
        id: setup_zig_primary
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback
        id: setup_zig_mirror_mach
        if: steps.setup_zig_primary.outcome == 'failure'
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://pkg.machengine.org/zig
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback (ziglang.org)
        if: steps.setup_zig_primary.outcome == 'failure' && steps.setup_zig_mirror_mach.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://ziglang.org/builds
          use-cache: true

      - name: Export pinned Zig for bare-metal QEMU group
        shell: bash
        run: |
          set -euo pipefail
          ZIG_BIN="$(command -v zig)"
          echo "OPENCLAW_ZIG_BIN=${ZIG_BIN}" >> "$GITHUB_ENV"
          echo "BAREMETAL_ZIG_BIN=${ZIG_BIN}" >> "$GITHUB_ENV"

      - name: Bare-metal Zig version
        shell: pwsh
        run: |
          Write-Output "BAREMETAL_ZIG_BIN=$env:BAREMETAL_ZIG_BIN"
          & $env:OPENCLAW_ZIG_BIN version

      - name: Install optional bare-metal runner prerequisites (Linux)
        if: runner.os == 'Linux'
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 gdb binutils nasm clang lld
          PWSH_BIN="$(command -v pwsh || true)"
          if [[ -z "${PWSH_BIN}" ]]; then
            echo "pwsh is not available on PATH"
            exit 1
          fi
          if ! command -v powershell >/dev/null 2>&1; then
            sudo ln -sf "${PWSH_BIN}" /usr/local/bin/powershell
          fi
          if ! command -v powershell.exe >/dev/null 2>&1; then
            sudo ln -sf "${PWSH_BIN}" /usr/local/bin/powershell.exe
          fi

      - name: Report optional bare-metal runner prerequisites (Linux)
        if: runner.os == 'Linux'
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          for tool in pwsh powershell powershell.exe qemu-system-x86_64 qemu-system-i386 gdb nm readelf nasm clang lld; do
            if command -v "${tool}" >/dev/null 2>&1; then
              printf '%s=%s\n' "${tool}" "$(command -v "${tool}")"
            else
              printf '%s=MISSING\n' "${tool}"
            fi
          done
          COMPILER_RT_PATH=""
          for cache_root in "${ZIG_GLOBAL_CACHE_DIR}" "${ZIG_LOCAL_CACHE_DIR}"; do
            if [[ -d "${cache_root}/o" ]]; then
              COMPILER_RT_PATH="$(find "${cache_root}/o" -name libcompiler_rt.a -print -quit 2>/dev/null || true)"
            fi
            if [[ -n "${COMPILER_RT_PATH}" ]]; then
              break
            fi
          done
          if [[ -n "${COMPILER_RT_PATH}" ]]; then
            printf 'libcompiler_rt.a=%s\n' "${COMPILER_RT_PATH}"
          else
            printf 'libcompiler_rt.a=MISSING\n'
          fi
          pwsh -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion'

      - name: Execute bare-metal QEMU family group (${{ matrix.step_count }} steps)
        shell: pwsh
        run: ./scripts/run-baremetal-qemu-ci-group.ps1 -Group '${{ matrix.id }}'

  cross-targets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-macos
            artifact_name: openclaw-zig-x86_64-macos
            binary_name: openclaw-zig
            optional: false
          - target: x86_64-linux-android
            artifact_name: openclaw-zig-x86_64-android
            binary_name: openclaw-zig
            optional: false
          - target: aarch64-linux-android
            artifact_name: openclaw-zig-aarch64-android
            binary_name: openclaw-zig
            optional: false
          - target: arm-linux-androideabi
            artifact_name: openclaw-zig-armv7-android
            binary_name: openclaw-zig
            optional: false
          - target: aarch64-linux
            artifact_name: openclaw-zig-aarch64-linux
            binary_name: openclaw-zig
            optional: true
          - target: aarch64-macos
            artifact_name: openclaw-zig-aarch64-macos
            binary_name: openclaw-zig
            optional: true
    continue-on-error: ${{ matrix.optional }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) primary
        id: setup_zig_primary
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback
        id: setup_zig_mirror_mach
        if: steps.setup_zig_primary.outcome == 'failure'
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://pkg.machengine.org/zig
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback (ziglang.org)
        if: steps.setup_zig_primary.outcome == 'failure' && steps.setup_zig_mirror_mach.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://ziglang.org/builds
          use-cache: true

      - name: Zig version
        run: zig version

      - name: Build release target
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --summary all

      - name: Stage artifact
        run: |
          mkdir -p out
          cp zig-out/bin/${{ matrix.binary_name }} out/${{ matrix.binary_name }}
          cp README.md out/README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/**
