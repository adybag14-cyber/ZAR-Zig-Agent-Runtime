name: python-release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: "0.2.0.dev0"
      release_tag:
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Resolve python version and release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_RAW="${{ inputs.version }}"
          RELEASE_TAG="${{ inputs.release_tag }}"

          if [[ "${VERSION_RAW}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-zig-([a-zA-Z0-9-]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            BUILD_NUMBER="${BASH_REMATCH[3]}"
            PY_VERSION="${BASE_VERSION}.dev${BUILD_NUMBER}"
            if [ -z "${RELEASE_TAG}" ]; then
              RELEASE_TAG="${VERSION_RAW}"
            fi
          else
            PY_VERSION="${VERSION_RAW}"
          fi

          if [[ -n "${RELEASE_TAG}" && "${RELEASE_TAG}" != v* ]]; then
            RELEASE_TAG="v${RELEASE_TAG}"
          fi

          echo "python_version=${PY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved python_version=${PY_VERSION}, release_tag=${RELEASE_TAG}"

      - name: Set python package version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          import os

          path = Path("python/openclaw-zig-rpc-client/pyproject.toml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["PY_VERSION"]
          match = re.search(r'^version = "([^"]+)"$', text, flags=re.MULTILINE)
          if not match:
              raise SystemExit("Unable to locate version in pyproject.toml")
          current = match.group(1)
          if current == version:
              print(f"pyproject version already set to {version}")
          else:
              updated = re.sub(r'^version = "[^"]+"$', f'version = "{version}"', text, count=1, flags=re.MULTILINE)
              path.write_text(updated, encoding="utf-8")
              print(f"Updated pyproject version to {version}")
          PY
        env:
          PY_VERSION: ${{ steps.meta.outputs.python_version }}

      - name: Build python distributions
        shell: bash
        run: |
          set -euo pipefail
          cd python/openclaw-zig-rpc-client
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine
          python -m pip install -e .
          python -m unittest discover -s tests -p "test_*.py"
          python -m build --sdist --wheel --outdir dist
          python -m twine check dist/*

      - name: Package registry preflight
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/package-registry-status.ps1 `
            -Repository "${{ github.repository }}" `
            -ReleaseTag "${{ steps.meta.outputs.release_tag }}" `
            -PythonPackageName "openclaw-zig-rpc-client" `
            -PythonVersion "${{ steps.meta.outputs.python_version }}" `
            -OutputJsonPath "./release/package-registry-status-python.json"

      - name: Upload python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/openclaw-zig-rpc-client/dist/*

      - name: Upload package registry preflight
        uses: actions/upload-artifact@v4
        with:
          name: package-registry-status-python
          path: release/package-registry-status-python.json

      - name: Attach python distributions to release
        if: ${{ steps.meta.outputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${TAG}" python/openclaw-zig-rpc-client/dist/* --repo "${{ github.repository }}" --clobber
            echo "Attached Python distributions to release ${TAG}."
          else
            echo "Release ${TAG} not found. Skipping release upload."
          fi

      - name: Detect PyPI token availability
        id: auth
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${PYPI_API_TOKEN}" ]; then
            echo "has_pypi_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pypi_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: ${{ steps.auth.outputs.has_pypi_token == 'true' }}
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          python -m twine upload python/openclaw-zig-rpc-client/dist/*

      - name: Publish to PyPI (trusted publishing)
        if: ${{ steps.auth.outputs.has_pypi_token == 'false' }}
        id: publish_trusted
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/openclaw-zig-rpc-client/dist
          skip-existing: true

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Python publish summary"
            echo ""
            echo "- input version: \`${{ inputs.version }}\`"
            echo "- resolved python version: \`${{ steps.meta.outputs.python_version }}\`"
            echo "- release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- PyPI token configured: \`${{ steps.auth.outputs.has_pypi_token }}\`"
            echo "- trusted publishing outcome: \`${{ steps.publish_trusted.outcome || 'not-run' }}\`"
            echo "- preflight artifact: \`package-registry-status-python.json\`"
            if [ "${{ steps.auth.outputs.has_pypi_token }}" = "false" ] && [ "${{ steps.publish_trusted.outcome }}" = "failure" ]; then
              echo "- public PyPI publish unavailable; wheel/sdist were still attached to the GitHub release"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
